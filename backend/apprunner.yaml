# AWS App Runner source-based build configuration.
# Used when App Runner builds directly from the connected repository.
# For ECR image-based deploys, this file is not required.
version: 1.0
runtime: nodejs20
build:
  commands:
    build:
      - npm ci
      - npm run build
run:
  runtime-version: 20
  command: node dist/index.js
  network:
    port: 8080
  env:
    - name: NODE_ENV
      value: production
    - name: PORT
      value: "8080"
